services:
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    volumes:
      - ./ollama:/root/.ollama
    ports:
      # Host port is configurable so it never collides with another local
      # service. Defaults to the standard Ollama port.
      - "${OLLAMA_PORT:-11434}:11434"
    environment:
      - OLLAMA_HOST=0.0.0.0:11434
      - OLLAMA_KEEP_ALIVE=${OLLAMA_KEEP_ALIVE:-24h}
    pull_policy: missing
    tty: true
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "ollama list >/dev/null 2>&1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    # Uncomment the lines below if you have an NVIDIA GPU
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: open-webui
    volumes:
      - ./open-webui:/app/backend/data
    depends_on:
      ollama:
        condition: service_healthy
    ports:
      # Defaults to 8090 to avoid clashing with common dev servers (e.g. the
      # Waymark web app on 3000). Override with WEBUI_PORT in your .env.
      - "${WEBUI_PORT:-8090}:8080"
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      # Auth can only be disabled on a fresh install (no existing users).
      # Set WEBUI_AUTH=True (and RESET_WEBUI_DATA=0) to keep accounts.
      - WEBUI_AUTH=${WEBUI_AUTH:-False}
      - ENABLE_SIGNUP=${ENABLE_SIGNUP:-False}
    restart: unless-stopped
